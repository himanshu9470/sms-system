<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - EduTech SMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh
        }

        .container {
            text-align: center;
            max-width: 480px;
            padding: 2rem
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 1.5rem
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.75rem
        }

        p {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.6
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3)
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">🚫</div>
        <h1>Access Denied</h1>
        <p>You don't have permission to access this page. Please contact your administrator if you believe this is an
            error.</p>
        <a th:href="@{/dashboard}" class="btn">Go to Dashboard</a>
    </div>
</body>

</html>
