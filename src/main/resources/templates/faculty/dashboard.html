<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - EduTech SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --bg-sidebar: #111827;
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --accent-emerald: #10b981;
            --accent-sky: #0ea5e9;
            --accent-amber: #f59e0b
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main)
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: var(--bg-sidebar);
            color: white;
            z-index: 1000;
            display: flex;
            flex-direction: column
        }

        .sidebar-brand {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1)
        }

        .sidebar-brand h4 {
            font-weight: 800;
            font-size: 1.1rem;
            background: linear-gradient(135deg, var(--accent-sky), var(--accent-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .sidebar-brand small {
            color: var(--text-muted);
            font-size: 0.75rem
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
            overflow-y: auto
        }

        .nav-section {
            padding: 0.5rem 1.5rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(148, 163, 184, 0.6);
            font-weight: 600;
            margin-top: 0.5rem
        }

        .sidebar .nav-link {
            color: rgba(248, 250, 252, 0.7);
            padding: 0.65rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            border-left: 3px solid transparent
        }

        .sidebar .nav-link:hover {
            color: #f8fafc;
            background: rgba(14, 165, 233, 0.08);
            border-left-color: rgba(14, 165, 233, 0.3)
        }

        .sidebar .nav-link.active {
            color: #f8fafc;
            background: rgba(14, 165, 233, 0.12);
            border-left-color: var(--accent-sky)
        }

        .sidebar .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 0.9rem
        }

        .main-content {
            margin-left: 260px;
            min-height: 100vh
        }

        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .topbar h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-dark)
        }

        .content-area {
            padding: 1.5rem 2rem
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 1.5rem;
            transition: all 0.3s
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06)
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-dark)
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px
        }

        .welcome-card {
            background: linear-gradient(135deg, var(--accent-sky), #0284c7);
            border-radius: 14px;
            padding: 2rem;
            color: white;
            margin-bottom: 1.5rem
        }

        .welcome-card h2 {
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 0.5rem
        }

        .welcome-card p {
            opacity: 0.85;
            font-size: 0.9rem
        }

        .quick-action {
            display: block;
            background: var(--bg-card);
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 1.25rem;
            text-decoration: none;
            transition: all 0.3s;
            text-align: center
        }

        .quick-action:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
            border-color: var(--accent-sky);
            text-decoration: none
        }

        .quick-action i {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            display: block
        }

        .quick-action span {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-dark)
        }

        @media(max-width:768px) {
            .sidebar {
                transform: translateX(-100%)
            }

            .main-content {
                margin-left: 0
            }
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h4><i class="fas fa-graduation-cap me-2"></i>EduTech SMS</h4><small>Faculty Panel</small>
        </div>
        <div class="sidebar-nav">
            <div class="nav-section">Main</div><a class="nav-link active" th:href="@{/faculty/dashboard}"><i
                    class="fas fa-th-large"></i> Dashboard</a>
            <div class="nav-section">Teaching</div><a class="nav-link" th:href="@{/faculty/courses}"><i
                    class="fas fa-book-open"></i> My Courses</a>
            <div class="nav-section">Account</div><a class="nav-link" th:href="@{/logout}"><i
                    class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>
    <div class="main-content">
        <div class="topbar">
            <h1><i class="fas fa-th-large me-2" style="color:var(--accent-sky)"></i>Faculty Dashboard</h1>
        </div>
        <div class="content-area">
            <div class="welcome-card">
                <h2>Welcome, Faculty!</h2>
                <p>Manage your courses and track student attendance from this dashboard.</p>
            </div>
            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="stat-value" th:text="${totalCourses}">0</div>
                                <div class="stat-label">Total Courses</div>
                            </div>
                            <div class="stat-icon" style="background:rgba(14,165,233,0.1);color:var(--accent-sky)"><i
                                    class="fas fa-book-open"></i></div>
                        </div>
                    </div>
                </div>
            </div>
            <h5 class="fw-bold mb-3"><i class="fas fa-bolt me-2" style="color:var(--accent-amber)"></i>Quick Actions
            </h5>
            <div class="row g-4">
                <div class="col-md-4"><a th:href="@{/faculty/courses}" class="quick-action"><i class="fas fa-book-open"
                            style="color:var(--accent-sky)"></i><span>View Courses</span></a></div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
