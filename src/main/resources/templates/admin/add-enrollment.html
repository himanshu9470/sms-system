<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Course - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: #1a2235;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand {
            padding: 0 25px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .brand h3 {
            color: #fff;
            font-size: 20px;
            font-weight: 600;
        }

        .brand i {
            color: #667eea;
            margin-right: 10px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #a0aec0;
            text-decoration: none;
            transition: all 0.3s;
            gap: 12px;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .sidebar a.active {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-right: 3px solid #667eea;
        }

        .sidebar a i {
            width: 20px;
            text-align: center;
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section {
            background: #1a2235;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h3 {
            font-size: 18px;
            color: #fff;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-size: 14px;
        }

        .form-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .form-group select option {
            background: #1a1a2e;
        }

        .btn-submit {
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .alert-success {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="brand">
            <h3><i class="fas fa-graduation-cap"></i> EduTech</h3><small style="color:#666">Admin Panel</small>
        </div>
        <a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a>
        <a th:href="@{/admin/students}"><i class="fas fa-user-graduate"></i> Students</a>
        <a th:href="@{/admin/faculty}"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
        <a th:href="@{/admin/parents}"><i class="fas fa-user-friends"></i> Parents</a>
        <a th:href="@{/admin/courses}"><i class="fas fa-book"></i> Courses</a>
        <a th:href="@{/admin/enrollments}" class="active"><i class="fas fa-clipboard-check"></i> Enrollments</a>
        <a th:href="@{/admin/timetable}"><i class="fas fa-calendar-alt"></i> Timetable</a>
        <a th:href="@{/admin/attendance}"><i class="fas fa-user-check"></i> Attendance</a>
        <a th:href="@{/admin/users}"><i class="fas fa-users-cog"></i> Users</a>
        <a th:href="@{/admin/reports}"><i class="fas fa-chart-bar"></i> Reports</a>
        <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="main">
        <h1><i class="fas fa-clipboard-check"></i> Assign Course</h1>

        <div class="section">
            <h3><i class="fas fa-plus"></i> New Enrollment</h3>
            <form th:action="@{/admin/enrollments/add}" method="post">
                <div class="form-group">
                    <label>Select Student</label>
                    <select name="studentId" required>
                        <option value="">-- Choose Student --</option>
                        <option th:each="student : ${students}" th:value="${student.studentId}"
                            th:text="${student.firstName + ' ' + student.lastName + ' (' + student.studentId + ')'}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Select Course</label>
                    <select name="courseId" required>
                        <option value="">-- Choose Course --</option>
                        <option th:each="course : ${courses}" th:value="${course.courseId}"
                            th:text="${course.courseName + ' (' + course.courseCode + ')'}">
                        </option>
                    </select>
                </div>

                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Assign Course</button>
                <a th:href="@{/admin/enrollments}" class="btn badge bg-secondary ms-2"
                    style="padding: 10px 20px; font-size: 14px;">Cancel</a>
            </form>
        </div>
    </div>
</body>

</html>
