<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Management - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar .brand {
            padding: 10px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 15px;
        }

        .sidebar .brand h3 {
            color: #667eea;
            font-size: 20px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #8892b0;
            text-decoration: none;
            transition: 0.3s;
            gap: 12px;
            font-size: 14px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-right: 3px solid #667eea;
        }

        .sidebar a i {
            width: 20px;
            text-align: center;
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .section {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .form-group select option {
            background: #1a1a2e;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(102, 126, 234, 0.15);
            padding: 12px;
            text-align: left;
            color: #667eea;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .btn-delete {
            color: #e74c3c;
            text-decoration: none;
        }

        .alert-success {
            background: rgba(39, 174, 96, 0.15);
            border: 1px solid rgba(39, 174, 96, 0.3);
            color: #2ecc71;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="brand">
            <h3><i class="fas fa-graduation-cap"></i> EduTech</h3><small style="color:#666">Admin Panel</small>
        </div>
        <a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a>
        <a th:href="@{/admin/students}"><i class="fas fa-user-graduate"></i> Students</a>
        <a th:href="@{/admin/courses}"><i class="fas fa-book"></i> Courses</a>
        <a th:href="@{/admin/faculty}"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
        <a th:href="@{/admin/timetable}"><i class="fas fa-calendar-alt"></i> Timetable</a>
        <a th:href="@{/admin/parents}" class="active"><i class="fas fa-users"></i> Parents</a>
        <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="main">
        <h1><i class="fas fa-users"></i> Parent Management</h1>
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div class="section">
            <h3><i class="fas fa-plus"></i> Add Parent Account</h3>
            <form th:action="@{/admin/parents/add}" method="post">
                <div class="form-row">
                    <div class="form-group"><label>Username</label><input name="username" required></div>
                    <div class="form-group"><label>Password</label><input type="password" name="password" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Full Name</label><input name="fullName" required></div>
                    <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Link to Student</label>
                        <select name="studentId" required>
                            <option value="">Select student...</option>
                            <option th:each="s : ${students}" th:value="${s.studentId}"
                                th:text="${s.firstName + ' ' + s.lastName + ' (' + s.email + ')'}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Relationship</label>
                        <select name="relationship" required>
                            <option value="FATHER">Father</option>
                            <option value="MOTHER">Mother</option>
                            <option value="GUARDIAN">Guardian</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Create Parent</button>
            </form>
        </div>
        <div class="section">
            <h3>All Parents</h3>
            <table th:if="${parents != null and !parents.isEmpty()}">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${parents}">
                        <td th:text="${p.username}"></td>
                        <td th:text="${p.fullName}"></td>
                        <td th:text="${p.email}"></td>
                        <td><a th:href="@{/admin/parents/delete/{id}(id=${p.id})}" class="btn-delete"
                                onclick="return confirm('Delete this parent?')"><i class="fas fa-trash"></i> Remove</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${parents == null or parents.isEmpty()}" style="color:#666;">No parent accounts yet.</p>
        </div>
    </div>
</body>

</html>
