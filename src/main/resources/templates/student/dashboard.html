<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3><i class="fas fa-tachometer-alt"></i> Student Dashboard</h3>
                    </div>
                    <div class="card-body">
                        <h4>Welcome, <span th:text="${student.firstName + ' ' + student.lastName}">Student Name</span>!</h4>
                        <p>Email: <span th:text="${student.email}">student@email.com</span></p>
                        <p>Department: <span th:text="${student.department}">Department</span></p>
                        <p>Semester: <span th:text="${student.semester}">Semester</span></p>
                        <p>CGPA: <span th:text="${student.cgpa}">0.00</span></p>
                        
                        <div class="mt-4">
                            <a href="/sms/logout" class="btn btn-danger">Logout</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
