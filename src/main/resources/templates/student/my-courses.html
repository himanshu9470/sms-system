<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - EduTech SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main)
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: var(--bg-dark);
            color: white;
            z-index: 1000;
            display: flex;
            flex-direction: column
        }

        .sidebar-brand {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1)
        }

        .sidebar-brand h4 {
            font-weight: 800;
            font-size: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .sidebar-brand small {
            color: var(--text-muted);
            font-size: 0.75rem
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
            overflow-y: auto
        }

        .nav-section {
            padding: 0.5rem 1.5rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(148, 163, 184, 0.6);
            font-weight: 600;
            margin-top: 0.5rem
        }

        .sidebar .nav-link {
            color: rgba(248, 250, 252, 0.7);
            padding: 0.65rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            border-left: 3px solid transparent
        }

        .sidebar .nav-link:hover {
            color: #f8fafc;
            background: rgba(99, 102, 241, 0.08);
            border-left-color: rgba(99, 102, 241, 0.3)
        }

        .sidebar .nav-link.active {
            color: #f8fafc;
            background: rgba(99, 102, 241, 0.12);
            border-left-color: var(--primary)
        }

        .sidebar .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 0.9rem
        }

        .main-content {
            margin-left: 260px;
            min-height: 100vh
        }

        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .topbar h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-dark)
        }

        .content-area {
            padding: 1.5rem 2rem
        }

        .enrollment-card {
            background: var(--bg-card);
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 1.5rem;
            transition: all 0.3s;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap
        }

        .enrollment-card:hover {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05)
        }

        .course-info {
            flex: 1;
            min-width: 200px
        }

        .course-code-badge {
            display: inline-block;
            padding: 0.25rem 0.65rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            margin-bottom: 0.5rem
        }

        .course-info h5 {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-dark);
            margin-bottom: 0.35rem
        }

        .course-details {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-muted)
        }

        .course-details span {
            display: flex;
            align-items: center;
            gap: 0.35rem
        }

        .badge-grade {
            padding: 0.35rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700
        }

        .badge-graded {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-emerald)
        }

        .badge-pending {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent-amber)
        }

        .btn-drop {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent-rose);
            border: 1px solid rgba(244, 63, 94, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s
        }

        .btn-drop:hover {
            background: var(--accent-rose);
            color: white;
            border-color: var(--accent-rose)
        }

        .btn-browse {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 0.55rem 1.25rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.3s
        }

        .btn-browse:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            color: white
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted)
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #cbd5e1
        }

        .alert-custom {
            border-radius: 10px;
            border: none;
            font-size: 0.875rem
        }

        @media(max-width:768px) {
            .sidebar {
                transform: translateX(-100%)
            }

            .main-content {
                margin-left: 0
            }
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h4><i class="fas fa-graduation-cap me-2"></i>EduTech SMS</h4><small>Student Portal</small>
        </div>
        <div class="sidebar-nav">
            <div class="nav-section">Main</div>
            <a class="nav-link" th:href="@{/student/dashboard}"><i class="fas fa-th-large"></i> Dashboard</a>
            <div class="nav-section">Academics</div>
            <a class="nav-link" th:href="@{/student/courses}"><i class="fas fa-book-open"></i> Available Courses</a>
            <a class="nav-link active" th:href="@{/student/my-courses}"><i class="fas fa-bookmark"></i> My Courses</a>
            <div class="nav-section">Account</div>
            <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>
    <div class="main-content">
        <div class="topbar">
            <h1><i class="fas fa-bookmark me-2" style="color:var(--primary)"></i>My Courses</h1>
            <a th:href="@{/student/courses}" class="btn-browse"><i class="fas fa-search me-2"></i>Browse Courses</a>
        </div>
        <div class="content-area">
            <div th:if="${success}" class="alert alert-success alert-custom alert-dismissible fade show mb-4">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span><button type="button"
                    class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${enrollments != null and !enrollments.isEmpty()}">
                <div th:each="enrollment : ${enrollments}" class="enrollment-card">
                    <div class="course-info">
                        <span class="course-code-badge" th:text="${enrollment.course.courseCode}"></span>
                        <h5 th:text="${enrollment.course.courseName}"></h5>
                        <div class="course-details">
                            <span><i class="fas fa-star"></i> <span th:text="${enrollment.course.credits}"></span>
                                Credits</span>
                            <span><i class="fas fa-calendar"></i> Enrolled: <span
                                    th:text="${enrollment.enrollmentDate}"></span></span>
                            <span>
                                <i class="fas fa-award"></i> Grade:
                                <span th:if="${enrollment.grade != null}" class="badge-grade badge-graded"
                                    th:text="${enrollment.grade}"></span>
                                <span th:if="${enrollment.grade == null}"
                                    class="badge-grade badge-pending">Pending</span>
                            </span>
                        </div>
                    </div>
                    <form th:action="@{/student/courses/drop/{enrollmentId}(enrollmentId=${enrollment.id})}"
                        method="POST">
                        <button type="submit" class="btn-drop"
                            onclick="return confirm('Are you sure you want to drop this course?')">
                            <i class="fas fa-times me-1"></i>Drop
                        </button>
                    </form>
                </div>
            </div>
            <div th:if="${enrollments == null or enrollments.isEmpty()}" class="empty-state">
                <i class="fas fa-bookmark"></i>
                <h5>No Enrolled Courses</h5>
                <p>You haven't enrolled in any courses yet.</p>
                <a th:href="@{/student/courses}" class="btn-browse mt-3"><i class="fas fa-search me-2"></i>Browse
                    Available Courses</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
