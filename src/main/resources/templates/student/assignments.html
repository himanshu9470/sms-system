<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignments - Student</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar .brand {
            padding: 10px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 15px;
        }

        .sidebar .brand h3 {
            color: #2ecc71;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #8892b0;
            text-decoration: none;
            transition: 0.3s;
            gap: 12px;
            font-size: 14px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            border-right: 3px solid #2ecc71;
        }

        .sidebar a i {
            width: 20px;
            text-align: center;
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
        }

        h1 {
            font-size: 28px;
            color: #2ecc71;
            margin-bottom: 30px;
        }

        .assignment-card {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .assignment-info h3 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .assignment-info p {
            color: #8892b0;
            font-size: 13px;
        }

        .assignment-meta {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .assignment-meta span {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
        }

        .meta-due {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }

        .meta-marks {
            background: rgba(52, 152, 219, 0.15);
            color: #3498db;
        }

        .status-submitted {
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
        }

        .status-graded {
            background: rgba(155, 89, 182, 0.15);
            color: #9b59b6;
        }

        .status-pending {
            background: rgba(241, 196, 15, 0.15);
            color: #f1c40f;
        }

        .btn-view {
            padding: 8px 16px;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="brand">
            <h3><i class="fas fa-graduation-cap"></i> EduTech</h3><small style="color:#666">Student Portal</small>
        </div>
        <a th:href="@{/student/dashboard}"><i class="fas fa-home"></i> Dashboard</a>
        <a th:href="@{/student/timetable}"><i class="fas fa-calendar-alt"></i> Timetable</a>
        <a th:href="@{/student/assignments}" class="active"><i class="fas fa-tasks"></i> Assignments</a>
        <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="main">
        <h1><i class="fas fa-tasks"></i> My Assignments</h1>
        <div th:each="a : ${assignments}" class="assignment-card">
            <div class="assignment-info">
                <h3 th:text="${a.title}"></h3>
                <p th:text="${a.course.courseName}"></p>
                <div class="assignment-meta">
                    <span class="meta-due"><i class="fas fa-calendar"></i> Due: <span
                            th:text="${#temporals.format(a.dueDate, 'dd MMM yyyy')}"></span></span>
                    <span class="meta-marks"><i class="fas fa-star"></i> <span th:text="${a.maxMarks}"></span>
                        marks</span>
                    <span th:if="${submissionMap.containsKey(a.id) and submissionMap[a.id].status.name() == 'GRADED'}"
                        class="status-graded">✓ Graded: <span th:text="${submissionMap[a.id].grade}"></span></span>
                    <span th:if="${submissionMap.containsKey(a.id) and submissionMap[a.id].status.name() != 'GRADED'}"
                        class="status-submitted">✓ Submitted</span>
                    <span th:unless="${submissionMap.containsKey(a.id)}" class="status-pending">⏳ Pending</span>
                </div>
            </div>
            <a th:href="@{/student/assignments/{id}(id=${a.id})}" class="btn-view"><i class="fas fa-eye"></i> View</a>
        </div>
        <p th:if="${assignments == null or assignments.isEmpty()}" style="color:#666; text-align:center; padding:40px;">
            No assignments available. Enroll in courses to see assignments.</p>
    </div>
</body>

</html>
