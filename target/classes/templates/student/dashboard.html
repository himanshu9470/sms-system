<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            margin: 5px 0;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        .main-content {
            background: #f8f9fa;
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        }
        .info-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .info-card h5 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: bold;
            color: #333;
        }
        .info-value {
            color: #666;
        }
        .quick-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .quick-link-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            text-align: center;
            transition: transform 0.3s;
        }
        .quick-link-btn:hover {
            color: white;
            transform: translateY(-3px);
            text-decoration: none;
        }
        .quick-link-btn i {
            font-size: 24px;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 sidebar p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-graduation-cap fa-3x mb-3"></i>
                    <h4>Student Portal</h4>
                </div>
                
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/student/dashboard}">
                            <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/student/courses}">
                            <i class="fas fa-book me-2"></i> Course Registration
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/student/courses/my-courses}">
                            <i class="fas fa-list me-2"></i> My Courses
                        </a>
                    </li>
                    <li class="nav-item mt-4">
                        <a class="nav-link" th:href="@{/logout}">
                            <i class="fas fa-sign-out-alt me-2"></i> Logout
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 main-content p-4">
                <div class="row">
                    <div class="col-md-12">
                        <h1 class="mb-4">
                            <i class="fas fa-tachometer-alt me-2"></i> Welcome, <span th:text="${student.firstName}">Student</span>!
                        </h1>
                    </div>
                </div>

                <!-- Student Information -->
                <div class="row">
                    <div class="col-md-6">
                        <div class="info-card">
                            <h5>Personal Information</h5>
                            <div class="info-row">
                                <span class="info-label">Full Name:</span>
                                <span class="info-value" th:text="${student.firstName + ' ' + student.lastName}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Email:</span>
                                <span class="info-value" th:text="${student.email}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Phone:</span>
                                <span class="info-value" th:text="${student.phone}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="info-card">
                            <h5>Academic Information</h5>
                            <div class="info-row">
                                <span class="info-label">Department:</span>
                                <span class="info-value" th:text="${student.department}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Semester:</span>
                                <span class="info-value" th:text="${student.semester}"></span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">CGPA:</span>
                                <span class="info-value" th:text="${student.cgpa}"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quick Links -->
                <div class="row mt-4">
                    <div class="col-md-12">
                        <h3 class="mb-3">Quick Actions</h3>
                        <div class="quick-links">
                            <a th:href="@{/student/courses}" class="quick-link-btn">
                                <i class="fas fa-plus-circle"></i>
                                Register for Courses
                            </a>
                            <a th:href="@{/student/courses/my-courses}" class="quick-link-btn">
                                <i class="fas fa-list-check"></i>
                                View My Courses
                            </a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
