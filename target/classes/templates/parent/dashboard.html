<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard - EduTech</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a2a3a 0%, #0d1b2a 100%);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar .brand {
            padding: 10px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 15px;
        }

        .sidebar .brand h3 {
            color: #e67e22;
            font-size: 20px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #8892b0;
            text-decoration: none;
            transition: 0.3s;
            gap: 12px;
            font-size: 14px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(230, 126, 34, 0.1);
            color: #e67e22;
            border-right: 3px solid #e67e22;
        }

        .sidebar a i {
            width: 20px;
            text-align: center;
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #e67e22, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .child-card {
            background: rgba(26, 42, 58, 0.8);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .child-info h3 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .child-info p {
            color: #8892b0;
            font-size: 13px;
        }

        .child-meta {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .child-meta span {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 12px;
            background: rgba(230, 126, 34, 0.15);
            color: #e67e22;
        }

        .child-actions {
            display: flex;
            gap: 10px;
        }

        .child-actions a {
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
        }

        .btn-attendance {
            background: rgba(52, 152, 219, 0.15);
            color: #3498db;
        }

        .btn-grades {
            background: rgba(155, 89, 182, 0.15);
            color: #9b59b6;
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="brand">
            <h3><i class="fas fa-graduation-cap"></i> EduTech</h3><small style="color:#666">Parent Portal</small>
        </div>
        <a th:href="@{/parent/dashboard}" class="active"><i class="fas fa-home"></i> Dashboard</a>
        <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="main">
        <h1><i class="fas fa-users"></i> My Children</h1>
        <div th:each="child : ${children}" class="child-card">
            <div class="child-info">
                <h3 th:text="${child.firstName + ' ' + child.lastName}"></h3>
                <p
                    th:text="${'Department: ' + child.department + ' | Semester: ' + (child.semester != null ? child.semester : 'N/A')}">
                </p>
                <div class="child-meta">
                    <span th:text="'CGPA: ' + (child.cgpa != null ? child.cgpa : 'N/A')"></span>
                    <span th:text="'Email: ' + child.email"></span>
                </div>
            </div>
            <div class="child-actions">
                <a th:href="@{/parent/attendance/{id}(id=${child.studentId})}" class="btn-attendance"><i
                        class="fas fa-clipboard-check"></i> Attendance</a>
                <a th:href="@{/parent/grades/{id}(id=${child.studentId})}" class="btn-grades"><i
                        class="fas fa-chart-bar"></i> Grades</a>
            </div>
        </div>
        <p th:if="${children == null or children.isEmpty()}" style="color:#666; text-align:center; padding:40px;">No
            children linked to your account. Contact admin to set up the link.</p>
    </div>
</body>

</html>
