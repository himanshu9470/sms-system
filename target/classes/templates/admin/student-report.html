<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report - Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
        }

        .content {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .print-btn {
            background: #27ae60;
            color: white;
            margin-bottom: 20px;
        }

        .print-btn:hover {
            background: #229954;
        }

        @media print {

            .print-btn,
            .header {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Student Report</h1>
            <div>
                <button class="btn print-btn" onclick="window.print()">Print Report</button>
                <a th:href="@{/admin/reports}" class="btn btn-primary">Back to Reports</a>
            </div>
        </div>

        <div class="content">
            <h2 style="margin-bottom: 20px;">All Students</h2>

            <table th:if="${students != null and !students.isEmpty()}">
                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Semester</th>
                        <th>CGPA</th>
                        <th>Phone</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.studentId}"></td>
                        <td th:text="${student.firstName + ' ' + student.lastName}"></td>
                        <td th:text="${student.email}"></td>
                        <td th:text="${student.department}"></td>
                        <td th:text="${student.semester}"></td>
                        <td th:text="${student.cgpa}"></td>
                        <td th:text="${student.phone}"></td>
                    </tr>
                </tbody>
            </table>

            <p th:if="${students == null or students.isEmpty()}" style="margin-top: 20px; color: #999;">No students
                found.</p>
        </div>
    </div>
</body>

</html>
