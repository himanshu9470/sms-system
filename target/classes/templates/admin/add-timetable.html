<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Timetable Entry - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #e0e0e0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar .brand {
            padding: 10px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 15px;
        }

        .sidebar .brand h3 {
            color: #667eea;
            font-size: 20px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #8892b0;
            text-decoration: none;
            transition: 0.3s;
            gap: 12px;
            font-size: 14px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-right: 3px solid #667eea;
        }

        .sidebar a i {
            width: 20px;
            text-align: center;
        }

        .main {
            margin-left: 260px;
            flex: 1;
            padding: 30px;
            max-width: 700px;
        }

        h1 {
            font-size: 24px;
            color: #667eea;
            margin-bottom: 30px;
        }

        .form-card {
            background: rgba(26, 26, 46, 0.8);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .form-group select {
            appearance: none;
        }

        .form-group select option {
            background: #1a1a2e;
        }

        .btn-submit {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-cancel {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            color: #ccc;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            text-decoration: none;
            margin-left: 10px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="brand">
            <h3><i class="fas fa-graduation-cap"></i> EduTech</h3><small style="color:#666">Admin Panel</small>
        </div>
        <a th:href="@{/admin/dashboard}"><i class="fas fa-home"></i> Dashboard</a>
        <a th:href="@{/admin/timetable}" class="active"><i class="fas fa-calendar-alt"></i> Timetable</a>
        <a th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
    <div class="main">
        <h1><i class="fas fa-plus-circle"></i> Add Timetable Entry</h1>
        <div class="form-card">
            <form th:action="@{/admin/timetable/add}" method="post">
                <div class="form-group">
                    <label>Course</label>
                    <select name="courseId" required>
                        <option value="">Select course...</option>
                        <option th:each="c : ${courses}" th:value="${c.id}"
                            th:text="${c.courseCode + ' - ' + c.courseName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Faculty</label>
                    <select name="facultyId" required>
                        <option value="">Select faculty...</option>
                        <option th:each="f : ${faculty}" th:value="${f.id}" th:text="${f.fullName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Day of Week</label>
                    <select name="dayOfWeek" required>
                        <option th:each="d : ${days}" th:value="${d}" th:text="${d}"></option>
                    </select>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" name="startTime" required>
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" name="endTime" required>
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>Room</label>
                        <input type="text" name="room" placeholder="e.g. Room 101">
                    </div>
                    <div class="form-group">
                        <label>Section</label>
                        <input type="text" name="section" placeholder="e.g. A">
                    </div>
                </div>
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Save Entry</button>
                <a th:href="@{/admin/timetable}" class="btn-cancel">Cancel</a>
            </form>
        </div>
    </div>
</body>

</html>
