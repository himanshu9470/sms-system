<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - EduTech SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-main)
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: var(--bg-dark);
            color: white;
            z-index: 1000;
            display: flex;
            flex-direction: column
        }

        .sidebar-brand {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1)
        }

        .sidebar-brand h4 {
            font-weight: 800;
            font-size: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .sidebar-brand small {
            color: var(--text-muted);
            font-size: 0.75rem
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem 0;
            overflow-y: auto
        }

        .nav-section {
            padding: 0.5rem 1.5rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(148, 163, 184, 0.6);
            font-weight: 600;
            margin-top: 0.5rem
        }

        .sidebar .nav-link {
            color: rgba(248, 250, 252, 0.7);
            padding: 0.65rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            border-left: 3px solid transparent
        }

        .sidebar .nav-link:hover {
            color: #f8fafc;
            background: rgba(99, 102, 241, 0.08);
            border-left-color: rgba(99, 102, 241, 0.3)
        }

        .sidebar .nav-link.active {
            color: #f8fafc;
            background: rgba(99, 102, 241, 0.12);
            border-left-color: var(--primary)
        }

        .sidebar .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 0.9rem
        }

        .main-content {
            margin-left: 260px;
            min-height: 100vh
        }

        .topbar {
            background: var(--bg-card);
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100
        }

        .topbar h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-dark)
        }

        .content-area {
            padding: 1.5rem 2rem
        }

        .card-custom {
            background: var(--bg-card);
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            overflow: hidden
        }

        .card-custom .card-header {
            background: var(--bg-card);
            border-bottom: 1px solid #e2e8f0;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .card-custom .card-header h5 {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-dark);
            margin: 0
        }

        .table {
            font-size: 0.875rem
        }

        .table thead th {
            background: #f8fafc;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
            padding: 0.75rem 1rem
        }

        .table tbody td {
            padding: 0.85rem 1rem;
            vertical-align: middle;
            color: var(--text-dark);
            border-bottom: 1px solid #f1f5f9
        }

        .table tbody tr:hover {
            background: #f8fafc
        }

        .badge-role {
            padding: 0.3rem 0.65rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600
        }

        .badge-admin {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent-rose)
        }

        .badge-student {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary)
        }

        .badge-faculty {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-emerald)
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-emerald)
        }

        .badge-disabled {
            background: rgba(244, 63, 94, 0.1);
            color: var(--accent-rose)
        }

        .alert-custom {
            border-radius: 10px;
            border: none;
            font-size: 0.875rem
        }

        @media(max-width:768px) {
            .sidebar {
                transform: translateX(-100%)
            }

            .main-content {
                margin-left: 0
            }
        }
    </style>
</head>

<body>
    <nav class="sidebar">
        <div class="sidebar-brand">
            <h4><i class="fas fa-graduation-cap me-2"></i>EduTech SMS</h4><small>Administration Panel</small>
        </div>
        <div class="sidebar-nav">
            <div class="nav-section">Main</div><a class="nav-link" th:href="@{/admin/dashboard}"><i
                    class="fas fa-th-large"></i> Dashboard</a>
            <div class="nav-section">Management</div><a class="nav-link" th:href="@{/admin/students}"><i
                    class="fas fa-users"></i> Students</a>
            <a class="nav-link" th:href="@{/admin/courses}"><i class="fas fa-book-open"></i> Courses</a>
            <a class="nav-link" th:href="@{/admin/enrollments}"><i class="fas fa-clipboard-list"></i> Enrollments</a>
            <a class="nav-link active" th:href="@{/admin/users}"><i class="fas fa-user-shield"></i> Users</a>
            <div class="nav-section">Analytics</div><a class="nav-link" th:href="@{/admin/reports}"><i
                    class="fas fa-chart-bar"></i> Reports</a>
            <div class="nav-section">System</div><a class="nav-link" th:href="@{/admin/settings}"><i
                    class="fas fa-cog"></i> Settings</a>
            <a class="nav-link" th:href="@{/logout}"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </nav>
    <div class="main-content">
        <div class="topbar">
            <h1><i class="fas fa-user-shield me-2" style="color:var(--primary)"></i>Users</h1>
        </div>
        <div class="content-area">
            <div th:if="${success}" class="alert alert-success alert-custom alert-dismissible fade show mb-4">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span><button type="button"
                    class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${error}" class="alert alert-danger alert-custom alert-dismissible fade show mb-4">
                <i class="fas fa-exclamation-triangle me-2"></i><span th:text="${error}"></span><button type="button"
                    class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="card-custom">
                <div class="card-header">
                    <h5><i class="fas fa-list me-2" style="color:var(--primary)"></i>All Users</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Full Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user : ${users}">
                                    <td class="fw-semibold" th:text="${user.id}"></td>
                                    <td class="fw-semibold" th:text="${user.username}"></td>
                                    <td th:text="${user.fullName}"></td>
                                    <td style="color:var(--text-muted)" th:text="${user.email}"></td>
                                    <td>
                                        <span th:if="${user.role.name() == 'ADMIN'}"
                                            class="badge-role badge-admin">Admin</span>
                                        <span th:if="${user.role.name() == 'STUDENT'}"
                                            class="badge-role badge-student">Student</span>
                                        <span th:if="${user.role.name() == 'FACULTY'}"
                                            class="badge-role badge-faculty">Faculty</span>
                                    </td>
                                    <td>
                                        <span th:if="${user.enabled}" class="badge-role badge-active">Active</span>
                                        <span th:if="${!user.enabled}" class="badge-role badge-disabled">Disabled</span>
                                    </td>
                                    <td style="color:var(--text-muted)"
                                        th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
