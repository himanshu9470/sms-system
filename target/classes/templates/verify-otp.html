<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - EduTech</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(30, 30, 50, 0.95);
            border-radius: 16px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
        }

        .card p {
            color: #999;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            text-align: center;
            letter-spacing: 8px;
            font-size: 24px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-danger {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .alert-info {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid rgba(52, 152, 219, 0.3);
            color: #3498db;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2><i class="fas fa-shield-halved"></i> Verify OTP</h2>
        <p>Enter the 6-digit code sent to your email</p>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${info}" class="alert alert-info" th:text="${info}"></div>
        <form th:action="@{/verify-otp}" method="post">
            <input type="hidden" name="email" th:value="${email}">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" th:value="${email}"
                    style="letter-spacing:normal; font-size:15px; text-align:left;" required>
            </div>
            <div class="form-group">
                <label>OTP Code</label>
                <input type="text" name="otp" maxlength="6" placeholder="000000" required>
            </div>
            <button type="submit" class="btn-primary"><i class="fas fa-check-circle"></i> Verify</button>
        </form>
    </div>
</body>

</html>
